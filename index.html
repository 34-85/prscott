<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PSMF Tracker</title>
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%A5%A9%3C/text%3E%3C/svg%3E" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">PSMF</span>
    <span class="tag">Tracker</span>
  </div>
  <nav id="nav">
    <a href="#/dashboard" data-route="dashboard">Dashboard</a>
    <a href="#/today" data-route="today">Today</a>
    <a href="#/weight" data-route="weight">Weight</a>
    <a href="#/calculator" data-route="calculator">Calculator</a>
    <a href="#/profile" data-route="profile">Profile</a>
    <a href="#/learn" data-route="learn">Learn</a>
  </nav>
</header>

<main id="view"></main>

<footer class="foot">
  <span>Data is stored only in your browser (localStorage).</span>
  <button id="exportBtn" class="link">Export</button>
  <button id="importBtn" class="link">Import</button>
  <button id="resetBtn" class="link danger">Reset all</button>
  <input type="file" id="importFile" accept="application/json" hidden />
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/calc.js"></script>
<script src="js/foods.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
